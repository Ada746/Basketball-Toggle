<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Basketball Toggle</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:Arial, sans-serif;
}

/* container */
.toggle-wrap{
  position:relative;
  width:260px;
  height:140px;
}

/* toggle track */
.toggle{
  width:220px;
  height:70px;
  background:#1e293b;
  border-radius:50px;
  position:absolute;
  bottom:0;
  left:20px;
  cursor:pointer;
  box-shadow: inset 0 0 10px rgba(0,0,0,.5);
  transition:.3s;
}

/* ON color */
.toggle.on{
  background:#22c55e;
}

/* hoop */
.hoop{
  position:absolute;
  right:10px;
  top:20px;
  width:60px;
  height:10px;
  background:#ef4444;
  border-radius:4px;
}

.net{
  position:absolute;
  right:18px;
  top:30px;
  width:44px;
  height:30px;
  border-left:2px solid white;
  border-right:2px solid white;
  border-bottom:2px solid white;
  border-radius:0 0 20px 20px;
}

/* basketball */
.ball{
  position:absolute;
  left:30px;
  bottom:35px;
  width:40px;
  height:40px;
  background:orange;
  border-radius:50%;
  box-shadow: inset -6px -6px 0 rgba(0,0,0,.25);
  transition: transform .6s cubic-bezier(.3,1.3,.4,1);
}

/* lines */
.ball::before,
.ball::after{
  content:"";
  position:absolute;
  background:#5a2a00;
}

.ball::before{
  width:2px;
  height:100%;
  left:50%;
  transform:translateX(-50%);
}

.ball::after{
  height:2px;
  width:100%;
  top:50%;
  transform:translateY(-50%);
}

/* animation when ON */
.toggle.on .ball{
  transform: translateX(150px) translateY(-40px);
}

.toggle.on .ball.drop{
  transform: translateX(150px) translateY(10px);
}
</style>
</head>

<body>

<div class="toggle-wrap">
  <div class="toggle" id="toggle">
    <div class="ball" id="ball"></div>
  </div>

  <div class="hoop"></div>
  <div class="net"></div>
</div>

<script>
const toggle = document.getElementById("toggle");
const ball = document.getElementById("ball");

toggle.addEventListener("click", () => {

  const isOn = toggle.classList.toggle("on");

  if(isOn){
    ball.classList.remove("drop");

    // after jump, drop into hoop
    setTimeout(()=>{
      ball.classList.add("drop");
    }, 400);
  }else{
    ball.classList.remove("drop");
  }

});
</script>

</body>
</html>
